name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Initialize Project Structure
        run: |
          # 这一步非常重要：它会补齐你缺失的 android 目录和配置文件
          flutter create . --force --platforms android
          flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
          --dart-define=API_KEY=${{ secrets.API_KEY }} \
          --dart-define=API_SECRET=${{ secrets.API_SECRET }} \
          --dart-define=PASSPHRASE=${{ secrets.PASSPHRASE }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
