name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Initialize Project Structure
        run: |
          # 修正后的指令：--force 放在最后，确保补齐 Android 目录
          flutter create --force --platforms android .
          flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
          --dart-define=API_KEY=${{ secrets.API_KEY }} \
          --dart-define=API_SECRET=${{ secrets.API_SECRET }} \
          --dart-define=PASSPHRASE=${{ secrets.PASSPHRASE }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
